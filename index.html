<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>5 Dakikada İngilizce Verb Master - V.1.0 </title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;900&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet" />
    <style>
        :root { 
            --bg-dark: #0f172a; 
            --card-bg: rgba(30, 41, 59, 0.6); 
            --primary: #38bdf8; 
            --secondary: #2dd4bf; 
            --accent: #fb7185; 
            --text-main: #f8fafc; 
            --logo-grad: linear-gradient(90deg, #ff4d4d, #f97316); 
            --white-grad: linear-gradient(180deg, #ffffff, #94a3b8);
        }

        body { 
            margin: 0; 
            font-family: 'Inter', sans-serif; 
            background: radial-gradient(circle at top right, #1e293b, #0f172a); 
            min-height: 100dvh; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            color: var(--text-main); 
            overflow: hidden; 
            padding: 10px; 
            box-sizing: border-box; 
            user-select: none; 
            -webkit-user-select: none; 
            touch-action: manipulation; 
        }

        /* --- ENTRY PAGE TASARIMI --- */
        #entry-page { display: flex; flex-direction: column; align-items: center; width: 100%; max-height: 95vh; overflow-y: auto; }
        
        .main-title-white { 
            font-family: 'Poppins'; font-size: 24px; font-weight: 900; 
            background: var(--white-grad); -webkit-background-clip: text; -webkit-text-fill-color: transparent; 
            margin-bottom: 5px; 
        }
        .select-lesson-title {
            background: var(--logo-grad); -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            font-size: 26px; margin: 5px 0 20px 0; font-weight: 900; font-family: 'Poppins';
        }

        #lesson-list-container { 
            width: 100%; display: grid; grid-template-columns: repeat(2, 1fr); 
            gap: 12px; max-width: 500px; padding-bottom: 40px; 
        }

        .lesson-card { 
            background: var(--card-bg); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            padding: 20px 10px; border-radius: 24px; border: 1px solid rgba(255,255,255,0.12); 
            text-align: center; transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3); cursor: pointer;
            display: flex; flex-direction: column; justify-content: center; align-items: center; min-height: 100px;
        }
        .lesson-card:hover { border-color: #f97316; transform: translateY(-3px); }
        
        .lesson-card h3 { 
            margin: 0 0 4px 0 !important; 
            font-family: 'Poppins' !important; 
            font-size: 1.1rem !important; 
            font-weight: 800 !important; 
            background: var(--logo-grad) !important; 
            -webkit-background-clip: text !important; 
            -webkit-text-fill-color: transparent !important;
            display: block !important; 
            width: 100% !important;
            line-height: 1.3 !important;
        }
        .lesson-card p { 
            margin: 0 !important; 
            font-size: 11px !important; 
            color: #94a3b8 !important; 
            font-weight: 500 !important; 
            display: block !important; 
            width: 100% !important;
            line-height: 1.4 !important;
            -webkit-text-fill-color: #94a3b8 !important;
        }

        /* --- APP SCREEN TASARIMI --- */
        #app-screen { display: none; width: 100%; max-width: 400px; flex-direction: column; }
        
        .top-bar { display: flex; justify-content: space-between; margin-bottom: 12px; gap: 8px; }
        
        .nav-btn { 
            background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.1); 
            border-radius: 12px; height: 40px; padding: 0 12px; font-size: 11px; font-weight: bold; 
            color: white; cursor: pointer; display: flex; align-items: center; gap: 5px; 
        }
        .nav-btn.active { background: var(--accent); box-shadow: 0 0 15px rgba(251, 113, 133, 0.4); border-color: white; }

        .app-box { 
            background: var(--card-bg); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            padding: 20px; border-radius: 30px; border: 1px solid rgba(255, 255, 255, 0.15); 
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.6); text-align: center; position: relative;
        }

        .lesson-title-grad { 
            background: var(--logo-grad); 
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent; 
            font-weight: 900; 
            font-size: 28px; 
            font-family: 'Poppins'; 
            margin: 0 0 4px 0;
            display: block !important; 
            width: 100% !important; 
            clear: both !important;
            line-height: 1.3 !important;
        }
        .lesson-content-desc { 
            color: #94a3b8 !important; 
            -webkit-text-fill-color: #94a3b8 !important;
            font-size: 13px !important; 
            font-weight: 500 !important; 
            margin: 0 0 15px 0 !important; 
            display: block !important; 
            width: 100% !important; 
            clear: both !important;
            line-height: 1.4 !important;
        }

        /* --- FLASH CARD TASARIMI --- */
        .card-container { perspective: 1000px; width: 100%; height: 210px; margin: 10px 0; position: relative; z-index: 2; }
        .card { width: 100%; height: 100%; position: relative; transform-style: preserve-3d; transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), top 0.3s, opacity 0.3s; }
        .card.flipped { transform: rotateY(180deg); }
        .face { 
            position: absolute; width: 100%; height: 100%; backface-visibility: hidden; 
            display: flex; align-items: center; justify-content: center; padding: 25px; 
            border-radius: 25px; border: 1px solid rgba(255,255,255,0.15); box-sizing: border-box; 
        }
        .front { background: #1e293b; color: var(--secondary); font-size: 26px; font-weight: 800; }
        .back { background: #1e293b; color: var(--text-main); transform: rotateY(180deg); font-size: 22px; font-weight: 700; border-color: var(--primary); }

        .swipe-note { 
            position: absolute; left: 50%; transform: translateX(-50%); padding: 8px 25px; 
            border-radius: 50px; font-family: 'Poppins'; font-weight: 900; font-size: 16px; 
            opacity: 0; transition: opacity 0.2s; z-index: 10; pointer-events: none; 
        }
        #note-know { top: 40px; background: var(--secondary); color: #0f172a; border: 2px solid white; }
        #note-dont { bottom: 40px; background: var(--accent); color: white; border: 2px solid white; }

        .controls-row { display: flex; gap: 8px; margin-bottom: 12px; }
        .control-btn { 
            flex: 1; background: rgba(51, 65, 85, 0.7); border: 1px solid rgba(255,255,255,0.05); 
            padding: 12px; border-radius: 12px; color: white; cursor: pointer; 
            display: flex; align-items: center; justify-content: center; font-weight: bold;
        }

        .btn-main { 
            background: linear-gradient(135deg, #38bdf8, #0ea5e9); color: #0f172a; 
            width: 100%; padding: 16px; border-radius: 18px; font-size: 18px; font-weight: 900; 
            border: none; font-family: 'Poppins'; cursor: pointer; margin-bottom: 15px; 
            display: flex; align-items: center; justify-content: center; gap: 10px;
            animation: pulse-glow 2s infinite;
        }

        @keyframes pulse-glow {
            0% { box-shadow: 0 0 0 0 rgba(56, 189, 248, 0.7); transform: scale(1); }
            70% { box-shadow: 0 0 0 12px rgba(56, 189, 248, 0); transform: scale(1.02); }
            100% { box-shadow: 0 0 0 0 rgba(56, 189, 248, 0); transform: scale(1); }
        }

        .stats { 
            display: flex; justify-content: space-between; background: rgba(15, 23, 42, 0.4); 
            padding: 12px 5px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.05); 
        }
        .stat-item { display: flex; flex-direction: column; align-items: center; flex: 1; }
        .stat-label-row { display: flex; align-items: center; gap: 3px; font-size: 7px; color: #94a3b8; font-weight: 800; margin-bottom: 2px; }
        .stat-val { font-weight: 900; font-size: 14px; color: var(--primary); }

        .v-tag { position: absolute; top: 10px; right: 10px; font-size: 10px; color: rgba(255,255,255,0.3); background: rgba(255,255,255,0.05); padding: 4px 8px; border-radius: 10px; }

        /* --- AI GENERATE BUTTON --- */
        .btn-ai-generate {
            width: 100%; max-width: 500px;
            background: linear-gradient(135deg, #f97316, #ff4d4d);
            border: none; border-radius: 20px; padding: 16px 20px;
            color: white; font-family: 'Poppins'; font-size: 15px; font-weight: 900;
            cursor: pointer; margin-bottom: 16px;
            display: flex; align-items: center; justify-content: center; gap: 10px;
            box-shadow: 0 8px 25px rgba(249,115,22,0.3);
        }

        /* --- AI GENERATE SCREEN --- */
        #generate-screen {
            display: none; flex-direction: column; align-items: center;
            width: 100%; max-width: 420px;
        }
        .gen-box {
            background: var(--card-bg); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            padding: 22px; border-radius: 30px; border: 1px solid rgba(255,255,255,0.15);
            width: 100%;
        }
        .gen-tabs { display: flex; gap: 6px; margin-bottom: 14px; }
        .gen-tab {
            flex: 1; padding: 8px 6px; border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.1); background: rgba(255,255,255,0.05);
            color: #94a3b8; font-size: 11px; font-weight: 700; cursor: pointer; text-align: center;
        }
        .gen-tab.active { background: linear-gradient(135deg, #f97316, #ff4d4d); color: white; }

        .verb-grid-list {
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 7px; 
            margin-bottom: 16px; max-height: 250px; overflow-y: auto;
        }
        .verb-chip {
            background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.08);
            border-radius: 12px; padding: 8px; cursor: pointer; text-align: center;
        }
        .verb-chip.selected { border-color: #f97316; background: rgba(249,115,22,0.2); }
        .verb-chip span { display: block; }
        .v-en { font-size: 12px; font-weight: 800; color: white; }
        .v-tr { font-size: 9px; color: #64748b; }

        .gen-input {
            width: 100%; background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.1); border-radius: 14px;
            padding: 12px; color: white; font-family: 'Poppins'; margin-top: 10px;
            box-sizing: border-box;
        }
        .btn-gen-start {
            width: 100%; background: linear-gradient(135deg, #f97316, #ff4d4d);
            border: none; border-radius: 16px; padding: 15px; color: white;
            font-family: 'Poppins'; font-weight: 900; cursor: pointer; margin: 15px 0;
        }
        .gen-progress-wrap { display: none; margin-top: 10px; }
        .gen-progress-bar-bg { background: rgba(255,255,255,0.1); height: 6px; border-radius: 10px; overflow: hidden; }
        .gen-progress-bar-fill { height: 100%; background: #f97316; width: 0%; transition: width 0.3s; }
    </style>
</head>
<body>

<div id="entry-page">
    <div class="main-title-white">5 Dakikada İngilizce</div>
    <div class="select-lesson-title">Flash Cards</div>
    <button class="btn-ai-generate" onclick="showGenerateScreen()">
        <span class="material-symbols-rounded">auto_awesome</span>
        AI ile Yeni Ders Oluştur
    </button>
    <div id="lesson-list-container"></div>
</div>

<div id="generate-screen">
    <div class="gen-box">
        <span style="font-family:'Poppins'; font-weight:900; font-size:20px; color:#f97316">✨ AI Generator</span>
        <div class="gen-tabs" style="margin-top:15px">
            <div id="tab-irreg" class="gen-tab active" onclick="switchGenTab('irregular')">Düzensiz</div>
            <div id="tab-reg" class="gen-tab" onclick="switchGenTab('regular')">Düzenli</div>
        </div>
        <div class="verb-grid-list" id="verbGridList"></div>
        <input class="gen-input" type="text" id="genVerbInput" placeholder="Veya manuel yaz: örn: go">
        <button class="btn-gen-start" onclick="startGenerateLesson()">Dersi Hazırla</button>
        <button style="background:none; border:none; color:#94a3b8; cursor:pointer" onclick="showHome()">← Geri</button>
        
        <div class="gen-progress-wrap" id="genProgressWrap">
            <div class="gen-progress-bar-bg"><div class="gen-progress-bar-fill" id="genProgressFill"></div></div>
            <div id="genProgressText" style="font-size:12px; color:#94a3b8; margin-top:5px; text-align:center">Analiz ediliyor...</div>
        </div>
    </div>
</div>

<div id="app-screen">
    <div class="top-bar">
        <button class="nav-btn" onclick="goHome()"><span class="material-symbols-rounded">home</span></button>
        <button id="trVoiceToggle" class="nav-btn" onclick="toggleTRVoice()">AUTO TR</button>
        <button class="nav-btn" onclick="resetLesson()">RESET</button>
    </div>
    <div class="app-box">
        <div id="lessonTitle" class="lesson-title-grad">#Lesson</div>
        <div id="lessonContent" class="lesson-content-desc"></div>
        <div id="note-know" class="swipe-note">BİLİYORUM ✅</div>
        <div id="note-dont" class="swipe-note">BİLMİYORUM ❌</div>
        <div class="card-container" id="swipeArea">
            <div class="card" id="mainCard" onclick="handleFlip()">
                <div class="face front" id="trDisplay">...</div>
                <div class="face back" id="engDisplay">...</div>
            </div>
        </div>
        <div class="controls-row">
            <button class="control-btn" onclick="goBack()">GERİ</button>
            <button class="control-btn" onclick="goNext()">İLERİ</button>
        </div>
        <button class="btn-main" onclick="speakEN()">LISTEN EN</button>
        <div class="stats">
            <div class="stat-item"><span class="stat-label-row">KALAN</span><span id="remainCount" class="stat-val">0</span></div>
            <div class="stat-item"><span class="stat-label-row">BİLİNEN</span><span id="correctCount" class="stat-val" style="color:var(--secondary)">0</span></div>
        </div>
    </div>
</div>

<script>
// --- VERİ TABANI ---
const VERB_DB = {
    irregular: {
        "go": { v2: "went", v3: "gone", tr: "Gitmek" },
        "do": { v2: "did", v3: "done", tr: "Yapmak" },
        "have": { v2: "had", v3: "had", tr: "Sahip olmak" },
        "eat": { v2: "ate", v3: "eaten", tr: "Yemek yemek" },
        "see": { v2: "saw", v3: "seen", tr: "Görmek" },
        "come": { v2: "came", v3: "come", tr: "Gelmek" },
        "sleep": { v2: "slept", v3: "slept", tr: "Uyumak" },
        "buy": { v2: "bought", v3: "bought", tr: "Satın almak" }
    },
    regular: {
        "study": { tr: "Ders çalışmak" },
        "work": { tr: "Çalışmak" },
        "clean": { tr: "Temizlemek" },
        "wash": { tr: "Yıkamak" },
        "play": { tr: "Oynamak" },
        "walk": { tr: "Yürümek" }
    }
};

let cards = [], learned = 0, wrong = 0, currentLesson = null;
let activeTab = 'irregular';

// --- ANA SAYFA DERSLERİ ---
function renderHome() {
    const container = document.getElementById('lesson-list-container');
    container.innerHTML = "";
    // Varsayılan ders
    const defaultLessons = [{ name: "Begginer", subTitle: "Temel Fiiller" }];
    
    // LocalStorage'dan AI derslerini çek
    Object.keys(localStorage).forEach(key => {
        if(key.startsWith('ai_lesson_')) {
            const name = key.replace('ai_lesson_', '');
            defaultLessons.push({ name: name, subTitle: "AI Generated", isAI: true });
        }
    });

    defaultLessons.forEach(l => {
        const div = document.createElement('div');
        div.className = "lesson-card";
        div.onclick = () => startLesson(l);
        div.innerHTML = `<h3>${l.name}</h3><p>${l.subTitle}</p>`;
        container.appendChild(div);
    });
}

function showGenerateScreen() {
    document.getElementById('entry-page').style.display = 'none';
    document.getElementById('generate-screen').style.display = 'flex';
    switchGenTab('irregular');
}

function showHome() {
    document.getElementById('generate-screen').style.display = 'none';
    document.getElementById('app-screen').style.display = 'none';
    document.getElementById('entry-page').style.display = 'flex';
    renderHome();
}

function switchGenTab(tab) {
    activeTab = tab;
    document.getElementById('tab-irreg').classList.toggle('active', tab==='irregular');
    document.getElementById('tab-reg').classList.toggle('active', tab==='regular');
    
    const grid = document.getElementById('verbGridList');
    grid.innerHTML = "";
    Object.keys(VERB_DB[tab]).forEach(v => {
        const chip = document.createElement('div');
        chip.className = "verb-chip";
        chip.onclick = () => { document.getElementById('genVerbInput').value = v; };
        chip.innerHTML = `<span class="v-en">${v}</span><span class="v-tr">${VERB_DB[tab][v].tr}</span>`;
        grid.appendChild(chip);
    });
}

function startGenerateLesson() {
    const verb = document.getElementById('genVerbInput').value.trim().toLowerCase();
    if(!verb) return alert("Fiil seç!");

    const wrap = document.getElementById('genProgressWrap');
    const fill = document.getElementById('genProgressFill');
    wrap.style.display = 'block';
    
    let p = 0;
    const inv = setInterval(() => {
        p += 10;
        fill.style.width = p + "%";
        if(p >= 100) {
            clearInterval(inv);
            finalizeAI(verb);
        }
    }, 100);
}

function finalizeAI(v) {
    let info = VERB_DB.irregular[v] || VERB_DB.regular[v];
    const v1 = v;
    const v2 = info?.v2 || (v1.endsWith('e') ? v1+'d' : v1+'ed');
    const v3 = info?.v3 || v2;
    const tr = info?.tr || "Eylem";

    const aiCards = [
        { tr: `${tr} (V1-V2-V3)`, en: `${v1} - ${v2} - ${v3}` },
        { tr: `Her gün ${tr.toLowerCase()} yaparım.`, en: `I ${v1} every day.` },
        { tr: `Dün ${tr.toLowerCase()} yaptım.`, en: `I ${v2} yesterday.` },
        { tr: `${tr.toLowerCase()} yapabilirim.`, en: `I can ${v1}.` },
        { tr: `Lütfen ${tr.toLowerCase()} yapma.`, en: `Please don't ${v1}.` }
    ];

    localStorage.setItem(`ai_lesson_${v.toUpperCase()}`, JSON.stringify(aiCards));
    showHome();
}

// --- DERS SİSTEMİ ---
function startLesson(lesson) {
    currentLesson = lesson;
    const data = localStorage.getItem(`ai_lesson_${lesson.name}`);
    cards = data ? JSON.parse(data) : [
        { tr: "Gitmek", en: "Go" },
        { tr: "Gelmek", en: "Come" }
    ];
    learned = 0;
    document.getElementById('entry-page').style.display = 'none';
    document.getElementById('app-screen').style.display = 'flex';
    document.getElementById('lessonTitle').innerText = lesson.name;
    showCard();
}

function showCard() {
    if(cards.length === 0) { alert("Tebrikler!"); return showHome(); }
    document.getElementById('mainCard').classList.remove('flipped');
    document.getElementById('trDisplay').innerText = cards[0].tr;
    document.getElementById('engDisplay').innerText = cards[0].en;
    document.getElementById('remainCount').innerText = cards.length;
    document.getElementById('correctCount').innerText = learned;
}

function handleFlip() { document.getElementById('mainCard').classList.toggle('flipped'); }
function goNext() { cards.push(cards.shift()); showCard(); }
function goBack() { cards.unshift(cards.pop()); showCard(); }

function speakEN() {
    const u = new SpeechSynthesisUtterance(cards[0].en);
    u.lang = 'en-US';
    window.speechSynthesis.speak(u);
}

function goHome() { showHome(); }

// İlk açılış
renderHome();
</script>
</body>
</html>
