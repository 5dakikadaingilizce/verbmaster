<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>5 Dakikada İngilizce - Öğrenme Yolu</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;900&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet" />
    <style>
        :root {
            --logo-grad: linear-gradient(90deg, #ff4d4d, #f97316);
            --white-grad: linear-gradient(180deg, #ffffff, #94a3b8);
            --secondary: #2dd4bf;
            --accent: #fb7185;
            --glass-border: rgba(255,255,255,0.12);
            --shadow-glow: 0 0 30px rgba(249,115,22,0.15);
            --active-color: #fbbf24;
            --active-shadow: #d97706;
            --locked-gray: #374151;
            --locked-shadow: #1f2937;
        }

        /* ══ 3. KAYDIRMA ÇUBUĞUNU GİZLEME ══ */
        * { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0; 
            -ms-overflow-style: none;  /* IE/Edge */
            scrollbar-width: none;  /* Firefox */
        }
        *::-webkit-scrollbar { 
            display: none; /* Chrome/Safari */
        }

        html, body { height: 100%; overflow-x: hidden; }
        body {
            font-family: 'Inter', sans-serif;
            background: #0f172a;
            color: #f8fafc;
            user-select: none;
            -webkit-user-select: none;
        }

        /* ══ ENTRY PAGE ══ */
        #entry-page {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            max-width: 480px;
            margin: 0 auto;
            min-height: 100dvh;
            padding: 20px 10px 100px;
        }

        /* ══ 2. ÜST LOGO STİLİ ══ */
        .top-logo-img {
            width: 100px;
            height: auto;
            margin-bottom: 5px;
        }

        .main-title-white {
            font-family: 'Poppins';
            font-size: 22px;
            font-weight: 900;
            background: var(--white-grad);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin: 0 0 20px;
        }

        #lesson-list-container {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 25px;
            position: relative;
        }

        .lesson-card {
            position: relative;
            display: flex;
            flex-direction: row-reverse !important;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: transform 0.2s;
            width: 100%;
            gap: 20px;
        }

        .lesson-card:nth-child(4n+2) { transform: translateX(30px); }
        .lesson-card:nth-child(4n+3) { transform: translateX(50px); }
        .lesson-card:nth-child(4n+4) { transform: translateX(30px); }

        .node-btn {
            width: 95px; height: 95px;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            position: relative; z-index: 2;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            flex-shrink: 0;
            background: #38bdf8;
            box-shadow: 0 8px 0 #0284c7;
        }

        .node-logo {
            width: 70%; height: 70%;
            background-size: contain !important;
            background-repeat: no-repeat;
            background-position: center;
            display: block;
        }

        .lesson-card h3 {
            font-size: 15px; font-weight: 800;
            color: #f8fafc; text-align: right;
            max-width: 180px; font-family: 'Poppins';
            line-height: 1.2;
        }

        .lesson-card.active .node-btn { 
            background: var(--active-color) !important; 
            box-shadow: 0 8px 0 var(--active-shadow) !important;
            width: 110px; height: 110px;
            animation: floatAnim 2.5s ease-in-out infinite;
            z-index: 10;
        }

        .lesson-card.disabled { cursor: not-allowed; }
        .lesson-card.disabled .node-btn { background: var(--locked-gray) !important; box-shadow: 0 8px 0 var(--locked-shadow) !important; opacity: 0.6; }
        .lesson-card.disabled .node-logo { filter: grayscale(1) opacity(0.5); }
        .lesson-card.completed .node-btn { opacity: 0.9; }

        /* ══ 1. İSİMLİ BADGE STİLİ ══ */
        .start-badge {
            position: absolute; top: -20px; right: 15px;
            background: white; color: #d97706;
            padding: 5px 12px; border-radius: 12px;
            font-weight: 900; font-size: 11px;
            box-shadow: 0 4px 0 #cbd5e1; z-index: 15;
            animation: bounce 1.5s infinite;
            text-transform: uppercase;
        }

        @keyframes floatAnim { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-5px); } }

        /* APP SCREEN STYLES (Kodunun devamı) */
        #app-screen { display: none; flex-direction: column; width: 100%; max-width: 420px; height: 100dvh; padding: 8px; overflow: hidden; margin: 0 auto; }
        .top-bar { display: flex; gap: 5px; background: rgba(15,23,42,0.7); backdrop-filter: blur(20px); padding: 5px; border-radius: 14px; margin-bottom: 6px; }
        .nav-btn { flex: 1; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.08); border-radius: 10px; height: 34px; font-size: 10px; color: #94a3b8; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 4px; }
        .app-box { background: linear-gradient(145deg, rgba(30,41,59,0.75), rgba(15,23,42,0.85)); padding: 12px; border-radius: 22px; text-align: center; position: relative; display: flex; flex-direction: column; flex: 1; }
        .btn-speak { background: linear-gradient(135deg, #38bdf8, #0ea5e9); color: white; width: 100%; height: 55px; border-radius: 16px; font-size: 18px; font-weight: 900; border: none; cursor: pointer; }
        #restartOverlay { display: none; position: absolute; inset: 0; background: rgba(15,23,42,0.98); border-radius: 22px; flex-direction: column; justify-content: center; align-items: center; z-index: 50; }
        .phrase-container { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; margin: 6px 0; background: rgba(15,23,42,0.55); border-radius: 18px; padding: 16px; }
        #phrase-tr { font-size: 26px; font-weight: 800; color: var(--secondary); }
        .stats { background: rgba(15,23,42,0.55); padding: 8px; border-radius: 14px; display: flex; justify-content: space-between; margin-top: 10px; }
        .v-tag { position: fixed; top: 10px; right: 10px; font-size: 10px; color: rgba(255,255,255,0.3); z-index: 200; }
    </style>
</head>
<body>

<div class="v-tag">V.5.2 - Personalized Mode</div>

<div id="entry-page">
    <img src="module1logo.png" alt="Module Logo" class="top-logo-img">
    <div class="main-title-white">5 Dakikada İngilizce</div>
    <div id="lesson-list-container"></div>
</div>

<div id="app-screen">
    <div class="top-bar">
        <button class="nav-btn" onclick="goHome()"><span class="material-symbols-rounded">home</span> HOME</button>
        <button id="autoTRToggle" class="nav-btn" onclick="toggleAutoTR()"><span class="material-symbols-rounded">volume_up</span> AUTO TR</button>
        <button class="nav-btn" onclick="resetToStart()"><span class="material-symbols-rounded">refresh</span> RESTART</button>
    </div>
    <div class="app-box">
        <div id="restartOverlay">
            <h2 style="color:var(--active-color); margin-bottom:20px;">Unit Completed! 🏆</h2>
            <button class="btn-speak" onclick="goHome()" style="width:80%;">HARİTAYA DÖN</button>
        </div>
        <div id="lessonTitle" style="font-weight:900; color:var(--active-color)">Lesson Name</div>
        <div class="phrase-container">
            <div id="phrase-tr">...</div>
            <div id="phrase-en" style="opacity:0; color:#94a3b8;">...</div>
        </div>
        <button class="btn-speak" id="startBtn">TAP TO SPEAK</button>
        <div class="stats" style="margin-top:15px;">
            <div id="current" class="stat-val">1</div>
            <div id="correct" class="stat-val">0</div>
            <div id="remaining" class="stat-val">0</div>
        </div>
    </div>
</div>

<script>
// ══ 1. İSİM KAYIT SİSTEMİ ══
let userNick = localStorage.getItem('app_user_nick');
if (!userNick) {
    userNick = prompt("Hoş geldin! Sana nasıl hitap etmemi istersin?");
    if (!userNick || userNick.trim() === "") userNick = "Kanka";
    localStorage.setItem('app_user_nick', userNick.toUpperCase());
} else {
    userNick = userNick.toUpperCase();
}

const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
const rec = new SR();
rec.lang = 'en-US';

const rainbowColors = [
    { bg: '#38bdf8', shadow: '#0284c7' },
    { bg: '#2dd4bf', shadow: '#0f766e' },
    { bg: '#a855f7', shadow: '#7e22ce' },
    { bg: '#fb7185', shadow: '#e11d48' },
    { bg: '#4ade80', shadow: '#16a34a' }
];

let allLessonsData = [], currentList = [], index = 0, activeLessonId = null;

fetch('data.json').then(r => r.json()).then(data => { 
    allLessonsData = data; 
    renderLessonMenu(); 
});

function renderLessonMenu() {
    const c = document.getElementById('lesson-list-container');
    c.innerHTML = '';
    const completedOnes = JSON.parse(localStorage.getItem('completed_lessons_list') || "[]");
    let activeFound = false;

    allLessonsData.forEach((lesson, i) => {
        const card = document.createElement('div');
        const isCompleted = completedOnes.includes(lesson.id);
        let statusClass = 'disabled';
        
        if (isCompleted) statusClass = 'completed';
        else if (!activeFound) { statusClass = 'active'; activeFound = true; }

        const colorSet = rainbowColors[i % rainbowColors.length];
        card.className = `lesson-card ${statusClass}`;
        if (statusClass !== 'disabled') card.onclick = () => startLesson(lesson);
        
        // 1. DİNAMİK "HADİ İSİM" BADGE
        card.innerHTML = `
            ${statusClass === 'active' ? `<div class="start-badge">HADİ ${userNick}!</div>` : ''}
            <div class="node-btn" style="background: ${colorSet.bg}; box-shadow: 0 8px 0 ${colorSet.shadow};">
                <div class="node-logo" style="background-image: url('${lesson.icon || 'logolar/logo1.svg'}');"></div>
            </div>
            <h3>${lesson.subTitle || lesson.title}</h3>
        `;
        c.appendChild(card);
    });
}

function startLesson(lesson) {
    fetch(lesson.file).then(r => r.json()).then(data => {
        activeLessonId = lesson.id;
        currentList = [...data];
        index = 0;
        document.getElementById('lessonTitle').innerText = lesson.title;
        document.getElementById('entry-page').style.display = 'none';
        document.getElementById('app-screen').style.display = 'flex';
        render();
    });
}

function render() {
    if (index >= currentList.length) {
        let completed = JSON.parse(localStorage.getItem('completed_lessons_list') || "[]");
        if (!completed.includes(activeLessonId)) {
            completed.push(activeLessonId);
            localStorage.setItem('completed_lessons_list', JSON.stringify(completed));
        }
        document.getElementById('restartOverlay').style.display = 'flex';
        return;
    }
    document.getElementById('phrase-tr').textContent = currentList[index].tr;
    document.getElementById('phrase-en').textContent = currentList[index].en;
    document.getElementById('current').textContent = index + 1;
    document.getElementById('remaining').textContent = currentList.length - (index + 1);
}

function goHome() {
    document.getElementById('app-screen').style.display = 'none';
    document.getElementById('entry-page').style.display = 'flex';
    renderLessonMenu();
}

function resetToStart() {
    index = 0;
    document.getElementById('restartOverlay').style.display = 'none';
    render();
}
</script>
</body>
</html>
